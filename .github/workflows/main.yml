name: Stock Bot

on:
  schedule:
    - cron: '30 0 * * 1-5'   # 08:30
    - cron: '0 2 * * 1-5'    # 10:00 🔥
    - cron: '0 4 * * 1-5'    # 12:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests pytz

      - run: python bot.py