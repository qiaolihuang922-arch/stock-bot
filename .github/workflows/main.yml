name: Stock Bot

on:
  schedule:
    # ===== 盤前 =====
    - cron: '30 0 * * 1-5'   # 08:30

    # ===== 盤中（每10分鐘）=====
    - cron: '0,10,20,30,40,50 1 * * 1-5'   # 09:00–09:50
    - cron: '0,10,20,30,40,50 2 * * 1-5'   # 10:00–10:50
    - cron: '0,10,20,30,40,50 3 * * 1-5'   # 11:00–11:50
    - cron: '0,10,20 4 * * 1-5'            # 12:00–12:20

    # ===== 收盤前 =====
    - cron: '30 4 * * 1-5'   # 12:30

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests pytz

      - run: python bot.py