name: Stock Bot

on:
 schedule:
  - cron: '30 0 * * 1-5'
  - cron: '0 3 * * 1-5'
  - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
          pip install pytz

      - name: Run bot
        run: python bot.py