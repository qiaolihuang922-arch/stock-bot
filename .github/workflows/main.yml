name: Stock Bot Pro

on:
  schedule:
    # 每5分鐘執行一次
    - cron: '*/5 * * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 🔥 正確安裝（關鍵）
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 執行（保留你原本 retry 邏輯）
      - name: Run bot (retry 3 times)
        run: |
          for i in 1 2 3
          do
            python bot.py && break
            echo "Retry $i failed..."
            sleep 5
          done